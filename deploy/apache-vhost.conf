# Apache VirtualHost — Short Interest Tracker
# Drop this into /etc/httpd/conf.d/ or /etc/apache2/sites-available/
# Adjust ServerName, SSL cert paths, and ProxyPass port as needed.
#
# Required Apache modules:
#   sudo a2enmod proxy proxy_http ssl headers rewrite
#   (or on RHEL/Amazon Linux, they're usually already loaded)

<VirtualHost *:443>
    ServerName shortinterest.yourdomain.com
    # ServerAlias si.yourdomain.com

    # ── SSL ──
    SSLEngine On
    SSLCertificateFile      /path/to/fullchain.pem
    SSLCertificateKeyFile   /path/to/privkey.pem
    SSLCertificateChainFile /path/to/chain.pem

    # Modern TLS only
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder     On

    # ── Security Headers ──
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # ── Rate Limiting (requires mod_ratelimit or mod_qos) ──
    # Option A: Simple bandwidth throttle per connection (mod_ratelimit)
    # SetOutputFilter RATE_LIMIT
    # SetEnv rate-limit 512  # KB/s per connection

    # Option B: mod_evasive (install separately, see deploy/mod_evasive.conf)
    # Best option for brute-force / DDoS protection

    # ── Reverse Proxy to gunicorn ──
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:60914/
    ProxyPassReverse / http://127.0.0.1:60914/

    # Pass real client IP to gunicorn
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "https"

    # ── Logging ──
    ErrorLog  ${APACHE_LOG_DIR}/shortinterest-error.log
    CustomLog ${APACHE_LOG_DIR}/shortinterest-access.log combined
</VirtualHost>

# ── Redirect HTTP → HTTPS ──
<VirtualHost *:80>
    ServerName shortinterest.yourdomain.com
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>
