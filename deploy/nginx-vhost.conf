# nginx reverse proxy — Short Interest Tracker
# Drop into /etc/nginx/conf.d/shortinterest.conf
#
# nginx listens on :443 (public, SSL)
# gunicorn listens on 127.0.0.1:60914 (internal only)
#
# Production config: set port to 60914 in tracker_config.json
# and host to 127.0.0.1 so gunicorn is never directly exposed.

# ── Rate Limiting Zones ──
# 10 requests/sec per IP for pages, 30/sec for API, 3/min for login failures
limit_req_zone $binary_remote_addr zone=si_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=si_api:10m     rate=30r/s;
limit_req_zone $binary_remote_addr zone=si_auth:10m    rate=3r/m;

# ── Upstream (gunicorn on localhost:60915) ──
upstream shortinterest {
    server 127.0.0.1:60914;
    keepalive 4;
}

# ── HTTPS on port 60914 ──
server {
    listen 443 ssl;
    http2 on;    
    # server_name is optional when using IP:port directly
    server_name shortinterest.yourdomain.com;

    # ── SSL ──
    ssl_certificate     /path/to/ssl.crt;
    ssl_certificate_key /path/to/ssl.key;
    ssl_trusted_certificate /path/to/ssl.rootchain;

    # Modern TLS
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 8.8.8.8 1.1.1.1 valid=300s;

    # ── Security Headers ──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Connection limits ──
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 30s;

    # ── Proxy to gunicorn ──
    location / {
        auth_basic "shortinterest login";
        auth_basic_user_file /etc/nginx/.htpasswd-shortinterest;
        # Rate limit: 10 req/s, burst 20 (queue without delay up to 20)
        limit_req zone=si_general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://shortinterest;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;  # long for /api/poll
        proxy_send_timeout 10s;

        # Buffer responses (protects gunicorn from slow clients)
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 8k;
    }

    # Higher rate limit for API endpoints
    location /api/ {
        limit_req zone=si_api burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://shortinterest;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Strict rate limit on auth failures (fail2ban also catches these)
    # This slows brute-force at the nginx level before it even hits Flask
    error_page 401 @auth_limited;
    location @auth_limited {
        limit_req zone=si_auth burst=5;
        return 401;
    }

    # Block common scanners
    location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi|wp-admin|wp-login) {
        return 444;
    }

    # ── Logging ──
    access_log /var/log/nginx/shortinterest-access.log;
    error_log  /var/log/nginx/shortinterest-error.log;
}

# No HTTP redirect needed — single port with SSL
