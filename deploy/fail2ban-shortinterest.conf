# fail2ban jail for Short Interest Tracker
# Copy this to /etc/fail2ban/jail.d/shortinterest.conf
# Copy the filter to /etc/fail2ban/filter.d/shortinterest.conf
#
# Install: sudo dnf install fail2ban  (or apt install fail2ban)
# Then:    sudo systemctl enable --now fail2ban

[shortinterest]
enabled  = true
port     = 60914
filter   = shortinterest
# Point to your nginx access log for this vhost
logpath  = /var/log/nginx/shortinterest-access.log

# Ban after 5 failed auth attempts in 5 minutes
maxretry = 5
findtime = 300
# Ban for 1 hour
bantime  = 3600
# Use iptables to block (works on EC2)
banaction = iptables-multiport
